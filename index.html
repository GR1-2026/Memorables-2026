<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>回忆礼物领养站 - 最终版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{padding:20px;background:#f7f3ee;font-family:Arial;max-width:800px;margin:0 auto;}
h1{color:#8B4B35;margin-bottom:20px;}
.box{background:#fff;padding:20px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.1);margin-bottom:20px;}
label{display:block;margin:8px 0 4px;color:#666;}
input,textarea{width:100%;padding:10px;border:1px solid #ddd;border-radius:4px;margin-bottom:10px;}
button{width:100%;padding:12px;background:#8B4B35;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:16px;}
button:hover{background:#7a402d;}
.tip{padding:10px;margin:10px 0;border-radius:4px;display:none;}
.success{background:#d4edda;color:#155724;display:block;}
.error{background:#f8d7da;color:#721c24;display:block;}
#giftList{margin-top:20px;}
.item{background:#fff;padding:15px;border-radius:8px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,0.1);position:relative;}
.claim-btn{background:#2196F3;color:white;border:none;padding:5px 10px;border-radius:4px;cursor:pointer;margin-top:5px;}
.loading{text-align:center;padding:20px;color:#666;}
</style>
</head>
<body>
<h1>回忆礼物领养站 🧡</h1>

<div class="box">
  <h3>✅ 系统就绪 - 云函数代码已确认</h3>
  <p><strong>支持的API：</strong>list, add, update</p>
  <p><strong>调用地址：</strong>https://gr1-3gwaj6dyccc835f1-1412377543.ap-shanghai.app.tcloudbase.com/gift</p>
  <p><strong>集合名称：</strong>gifts</p>
</div>

<!-- 添加物品面板 -->
<div class="box">
  <h3>添加物品</h3>
  <label>物品名称</label>
  <input type="text" id="name" placeholder="输入名称" value="测试物品">
  
  <label>物品描述</label>
  <textarea id="desc" placeholder="输入描述">测试描述</textarea>
  
  <button id="addBtn">添加物品</button>
  <button id="refreshBtn" style="background:#2196F3; margin-top:10px;">刷新列表</button>
</div>

<div id="tip" class="tip"></div>

<!-- 物品列表 -->
<div id="giftList" class="loading">正在加载物品列表...</div>

<script>
// 配置
const HTTP_TRIGGER_URL = "https://gr1-3gwaj6dyccc835f1-1412377543.ap-shanghai.app.tcloudbase.com/gift";

// 显示提示
function showTip(msg, isSuccess) {
  const tipEl = document.getElementById('tip');
  tipEl.innerText = msg;
  tipEl.className = isSuccess ? 'tip success' : 'tip error';
  setTimeout(() => {
    tipEl.className = 'tip';
  }, 3000);
}

// 调用云函数API
async function callGiftAPI(data) {
  console.log("调用云函数:", data);
  
  try {
    const response = await fetch(HTTP_TRIGGER_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
      },
      body: JSON.stringify(data)
    });
    
    if (!response.ok) {
      throw new Error(`HTTP错误! 状态: ${response.status} ${response.statusText}`);
    }
    
    const result = await response.json();
    console.log("云函数响应:", result);
    
    return result;
    
  } catch (error) {
    console.error("API调用失败:", error);
    throw error;
  }
}

// 加载物品列表
async function loadGiftList() {
  try {
    const result = await callGiftAPI({ api: 'list' });
    console.log("列表结果:", result);
    
    const listEl = document.getElementById('giftList');
    
    if (result.code === 0) {
      if (result.data && result.data.length > 0) {
        listEl.innerHTML = result.data.map(gift => `
          <div class='item' id="gift-${gift._id}">
            <h4>${gift.name}</h4>
            <p>${gift.desc || '无描述'}</p>
            <p>库存: ${gift.stock} | 已领取: ${gift.claimed} | 剩余: ${gift.stock - gift.claimed}</p>
            <p><small>ID: ${gift._id}</small></p>
            
            ${gift.claimed < gift.stock ? `
              <button class="claim-btn" onclick="claimItem('${gift._id}')">领取此物品</button>
            ` : `
              <p style="color:#f44336;">已领完</p>
            `}
            
            <div style="margin-top:10px;">
              <small>领取人: ${gift.claimers && gift.claimers.length > 0 ? gift.claimers.join(', ') : '暂无'}</small>
            </div>
          </div>
        `).join('');
      } else {
        listEl.innerHTML = '<div class="item">暂无物品，点击添加第一个～</div>';
      }
    } else {
      listEl.innerHTML = `<div class="item">加载失败: ${result.msg}</div>`;
      showTip('加载失败: ' + result.msg, false);
    }
  } catch (error) {
    document.getElementById('giftList').innerHTML = `<div class="item">加载失败: ${error.message}</div>`;
    showTip('加载失败: ' + error.message, false);
  }
}

// 添加物品
async function addGift() {
  const giftName = document.getElementById('name').value.trim();
  const giftDesc = document.getElementById('desc').value.trim();
  
  if (!giftName) {
    showTip("请填写物品名称", false);
    return;
  }
  
  showTip("正在添加物品...", true);
  
  try {
    const result = await callGiftAPI({
      api: 'add',
      name: giftName,
      desc: giftDesc
    });
    
    console.log("添加结果:", result);
    
    if (result.code === 0) {
      showTip(`添加成功！物品ID: ${result.data._id}`, true);
      document.getElementById('name').value = '';
      document.getElementById('desc').value = '';
      loadGiftList(); // 刷新列表
    } else {
      showTip(`添加失败: ${result.msg}`, false);
    }
  } catch (error) {
    showTip(`添加失败: ${error.message}`, false);
  }
}

// 领取物品
async function claimItem(giftId) {
  const userName = prompt("请输入您的姓名（领取人）:");
  if (!userName) return;
  
  // 先获取当前物品信息
  try {
    const listResult = await callGiftAPI({ api: 'list' });
    
    if (listResult.code !== 0) {
      showTip("获取物品列表失败: " + listResult.msg, false);
      return;
    }
    
    const gift = listResult.data.find(g => g._id === giftId);
    
    if (!gift) {
      showTip("物品不存在", false);
      return;
    }
    
    if (gift.claimed >= gift.stock) {
      showTip("此物品已领完", false);
      return;
    }
    
    // 检查是否已经领取过
    if (gift.claimers && gift.claimers.includes(userName)) {
      showTip("您已经领取过此物品了", false);
      return;
    }
    
    showTip("正在领取...", true);
    
    // 更新物品信息
    const newClaimers = [...(gift.claimers || []), userName];
    const newClaimed = gift.claimed + 1;
    
    const updateResult = await callGiftAPI({
      api: 'update',
      id: giftId,
      claimers: newClaimers,
      claimed: newClaimed
    });
    
    console.log("更新结果:", updateResult);
    
    if (updateResult.code === 0) {
      showTip(`领取成功！感谢 ${userName}`, true);
      loadGiftList(); // 刷新列表
    } else {
      showTip(`领取失败: ${updateResult.msg}`, false);
    }
  } catch (error) {
    showTip(`领取失败: ${error.message}`, false);
  }
}

// 页面初始化
document.addEventListener('DOMContentLoaded', function() {
  console.log("页面初始化完成");
  
  // 绑定按钮事件
  document.getElementById('addBtn').addEventListener('click', addGift);
  document.getElementById('refreshBtn').addEventListener('click', loadGiftList);
  
  // 初始加载列表
  setTimeout(() => {
    loadGiftList();
  }, 500);
});

// 添加一个控制台测试函数
window.testAPI = async function(api, data) {
  const payload = { api, ...data };
  console.log("测试调用:", payload);
  return await callGiftAPI(payload);
};
</script>
</body>
</html>
