<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>回忆礼物领养站 - 400错误修复</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{padding:20px;background:#f7f3ee;font-family:Arial;max-width:800px;margin:0 auto;}
h1{color:#8B4B35;margin-bottom:20px;}
.box{background:#fff;padding:20px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.1);margin-bottom:20px;}
label{display:block;margin:8px 0 4px;color:#666;}
input,textarea{width:100%;padding:10px;border:1px solid #ddd;border-radius:4px;margin-bottom:10px;}
button{width:100%;padding:12px;background:#8B4B35;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:16px;}
button:hover{background:#7a402d;}
.tip{padding:10px;margin:10px 0;border-radius:4px;display:none;}
.success{background:#d4edda;color:#155724;display:block;}
.error{background:#f8d7da;color:#721c24;display:block;}
#giftList{margin-top:20px;}
.item{background:#fff;padding:15px;border-radius:8px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,0.1);}
.loading{text-align:center;padding:20px;color:#666;}
.debug-panel{background:#f8f9fa;padding:15px;border-radius:8px;margin:20px 0;border-left:4px solid #6c757d;}
</style>
</head>
<body>
<h1>回忆礼物领养站 🧡</h1>

<div class="debug-panel">
  <h3>🔧 HTTP 400错误调试</h3>
  <p><strong>问题：</strong>服务器返回HTTP 400错误（错误的请求）</p>
  <p><strong>可能原因：</strong></p>
  <ol>
    <li>JSON格式不正确</li>
    <li>缺少必要的请求头</li>
    <li>URL编码问题</li>
    <li>请求体太大</li>
  </ol>
  <button id="debugBtn" style="background:#2196F3;">运行调试测试</button>
</div>

<div class="box">
  <h3>API测试</h3>
  <div style="display:flex;gap:10px;margin-bottom:15px;">
    <button id="testListBtn" style="flex:1;background:#4CAF50;">测试list接口</button>
    <button id="testAddBtn" style="flex:1;background:#2196F3;">测试add接口</button>
  </div>
</div>

<div class="box">
  <h3>添加物品</h3>
  <label>物品名称</label>
  <input type="text" id="name" placeholder="输入名称" value="测试物品">
  
  <label>物品描述</label>
  <textarea id="desc" placeholder="输入描述">测试描述</textarea>
  
  <button id="addBtn">添加物品</button>
  <button id="refreshBtn" style="background:#9C27B0; margin-top:10px;">刷新列表</button>
</div>

<div id="tip" class="tip"></div>

<div class="box">
  <h3>调试日志</h3>
  <div id="debugLog" style="background:#212529;color:#fff;padding:15px;border-radius:4px;max-height:400px;overflow-y:auto;font-family:monospace;font-size:12px;white-space:pre-wrap;">
等待操作...
  </div>
</div>

<div id="giftList" class="loading">点击"测试list接口"加载数据</div>

<script>
// 配置
const HTTP_TRIGGER_URL = "https://gr1-3gwaj6dyccc835f1-1412377543.ap-shanghai.app.tcloudbase.com/gift";

// 调试日志
function addDebugLog(message, type = 'info') {
  const logEl = document.getElementById('debugLog');
  const timestamp = new Date().toLocaleTimeString();
  const color = type === 'success' ? '#4CAF50' : 
                type === 'error' ? '#f44336' : 
                type === 'warning' ? '#FF9800' : '#03A9F4';
  
  const logLine = `[${timestamp}] <span style="color:${color}">${message}</span>`;
  logEl.innerHTML = logLine + '\n' + logEl.innerHTML;
  
  // 保持日志数量
  if (logEl.innerHTML.split('\n').length > 50) {
    const lines = logEl.innerHTML.split('\n').slice(0, 50);
    logEl.innerHTML = lines.join('\n');
  }
}

// 显示提示
function showTip(msg, isSuccess) {
  addDebugLog(`提示: ${msg}`, isSuccess ? 'success' : 'error');
  const tipEl = document.getElementById('tip');
  tipEl.innerText = msg;
  tipEl.className = isSuccess ? 'tip success' : 'tip error';
  setTimeout(() => {
    tipEl.className = 'tip';
  }, 3000);
}

// 调用云函数API（修复版）
async function callGiftAPI(data) {
  addDebugLog(`发送请求: ${JSON.stringify(data)}`, 'info');
  
  try {
    // 确保数据是有效的JSON
    const jsonData = JSON.stringify(data);
    
    // 详细的请求信息
    addDebugLog(`URL: ${HTTP_TRIGGER_URL}`, 'info');
    addDebugLog(`Method: POST`, 'info');
    addDebugLog(`Content-Type: application/json`, 'info');
    addDebugLog(`Body: ${jsonData}`, 'info');
    
    const response = await fetch(HTTP_TRIGGER_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json; charset=utf-8',
        'Accept': 'application/json',
        'User-Agent': 'Mozilla/5.0'
      },
      mode: 'cors',
      cache: 'no-cache',
      credentials: 'omit',
      body: jsonData
    });
    
    addDebugLog(`响应状态: ${response.status} ${response.statusText}`, 'info');
    
    // 获取响应文本（无论状态码是什么）
    const responseText = await response.text();
    addDebugLog(`响应体: ${responseText}`, 'info');
    
    if (!response.ok) {
      // 尝试解析为JSON
      let errorData = responseText;
      try {
        errorData = JSON.parse(responseText);
      } catch (e) {
        // 不是JSON，保持原文本
      }
      
      throw new Error(`HTTP ${response.status}: ${response.statusText}\n${typeof errorData === 'object' ? JSON.stringify(errorData, null, 2) : errorData}`);
    }
    
    // 解析响应
    const result = JSON.parse(responseText);
    addDebugLog(`解析结果: ${JSON.stringify(result)}`, 'success');
    
    return result;
    
  } catch (error) {
    addDebugLog(`请求失败: ${error.message}`, 'error');
    console.error("API调用详细错误:", error);
    throw error;
  }
}

// 调试测试
async function runDebugTests() {
  addDebugLog('=== 开始调试测试 ===', 'warning');
  
  // 测试1：空请求
  addDebugLog('测试1: 发送空对象 {}', 'info');
  try {
    const result1 = await fetch(HTTP_TRIGGER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: '{}'
    });
    addDebugLog(`空对象响应: ${result1.status} ${result1.statusText}`, 'info');
  } catch (e) {
    addDebugLog(`空对象错误: ${e.message}`, 'error');
  }
  
  await new Promise(resolve => setTimeout(resolve, 500));
  
  // 测试2：GET请求
  addDebugLog('测试2: 发送GET请求', 'info');
  try {
    const result2 = await fetch(HTTP_TRIGGER_URL, { method: 'GET' });
    addDebugLog(`GET响应: ${result2.status} ${result2.statusText}`, 'info');
  } catch (e) {
    addDebugLog(`GET错误: ${e.message}`, 'error');
  }
  
  await new Promise(resolve => setTimeout(resolve, 500));
  
  // 测试3：简单的list请求
  addDebugLog('测试3: 发送简单的list请求', 'info');
  try {
    const result3 = await callGiftAPI({ api: 'list' });
    addDebugLog(`list测试结果: ${JSON.stringify(result3)}`, 'success');
  } catch (e) {
    addDebugLog(`list测试错误: ${e.message}`, 'error');
  }
  
  await new Promise(resolve => setTimeout(resolve, 500));
  
  // 测试4：查看URL是否可访问
  addDebugLog('测试4: 直接访问URL', 'info');
  try {
    const result4 = await fetch(HTTP_TRIGGER_URL);
    addDebugLog(`直接访问响应: ${result4.status} ${result4.statusText}`, 'info');
  } catch (e) {
    addDebugLog(`直接访问错误: ${e.message}`, 'error');
  }
  
  addDebugLog('=== 调试测试完成 ===', 'warning');
}

// 测试list接口
async function testListAPI() {
  addDebugLog('测试list接口...', 'info');
  showTip("正在测试list接口...", true);
  
  try {
    const result = await callGiftAPI({ api: 'list' });
    
    if (result.code === 0) {
      showTip(`list接口成功! 返回 ${result.data?.length || 0} 条数据`, true);
      displayGiftList(result.data);
    } else {
      showTip(`list接口错误: ${result.msg}`, false);
    }
  } catch (error) {
    showTip(`list接口失败: ${error.message}`, false);
  }
}

// 测试add接口
async function testAddAPI() {
  addDebugLog('测试add接口...', 'info');
  showTip("正在测试add接口...", true);
  
  try {
    const result = await callGiftAPI({
      api: 'add',
      name: '调试测试_' + Date.now(),
      desc: '这是一个调试测试物品'
    });
    
    if (result.code === 0) {
      showTip(`add接口成功! 物品ID: ${result.data?._id}`, true);
      setTimeout(testListAPI, 1000);
    } else {
      showTip(`add接口错误: ${result.msg}`, false);
    }
  } catch (error) {
    showTip(`add接口失败: ${error.message}`, false);
  }
}

// 添加物品
async function addGift() {
  const giftName = document.getElementById('name').value.trim();
  const giftDesc = document.getElementById('desc').value.trim();
  
  if (!giftName) {
    showTip("请填写物品名称", false);
    return;
  }
  
  addDebugLog(`添加物品: ${giftName}`, 'info');
  showTip("正在添加物品...", true);
  
  try {
    const result = await callGiftAPI({
      api: 'add',
      name: giftName,
      desc: giftDesc
    });
    
    if (result.code === 0) {
      showTip(`添加成功! 物品ID: ${result.data?._id}`, true);
      document.getElementById('name').value = '';
      document.getElementById('desc').value = '';
      setTimeout(testListAPI, 1000);
    } else {
      showTip(`添加失败: ${result.msg}`, false);
    }
  } catch (error) {
    showTip(`添加失败: ${error.message}`, false);
  }
}

// 显示物品列表
function displayGiftList(gifts) {
  const listEl = document.getElementById('giftList');
  
  if (!gifts || gifts.length === 0) {
    listEl.innerHTML = '<div class="item">暂无物品</div>';
    return;
  }
  
  listEl.innerHTML = gifts.map(gift => `
    <div class='item'>
      <h4>${gift.name}</h4>
      <p>${gift.desc || '无描述'}</p>
      <p>ID: ${gift._id}</p>
      <p>库存: ${gift.stock} | 已领取: ${gift.claimed}</p>
    </div>
  `).join('');
}

// 页面初始化
document.addEventListener('DOMContentLoaded', function() {
  addDebugLog('页面初始化完成', 'success');
  
  // 绑定事件
  document.getElementById('debugBtn').addEventListener('click', runDebugTests);
  document.getElementById('testListBtn').addEventListener('click', testListAPI);
  document.getElementById('testAddBtn').addEventListener('click', testAddAPI);
  document.getElementById('addBtn').addEventListener('click', addGift);
  document.getElementById('refreshBtn').addEventListener('click', testListAPI);
  
  // 自动运行简单测试
  setTimeout(() => {
    addDebugLog('开始自动简单测试...', 'warning');
    testListAPI();
  }, 1000);
});

// 在控制台添加测试函数
window.debugCloudFunction = {
  rawFetch: async function(data) {
    console.log('原始fetch调用:', data);
    return await fetch(HTTP_TRIGGER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
  },
  
  testSimple: async function() {
    const tests = [
      { api: 'list' },
      { api: 'add', name: '控制台测试', desc: '来自控制台' }
    ];
    
    for (let test of tests) {
      console.log('测试:', test);
      try {
        const response = await fetch(HTTP_TRIGGER_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(test)
        });
        console.log('响应状态:', response.status, response.statusText);
        const text = await response.text();
        console.log('响应体:', text);
      } catch (error) {
        console.error('错误:', error);
      }
    }
  }
};
</script>
</body>
</html>
