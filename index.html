<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>回忆礼物领养站 - 最终版</title>
<!-- 腾讯云SDK（固定正确地址，无版本问题） -->
<script src="https://res.wx.qq.com/open/js/cloudbase/1.1.0/cloud.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{padding:20px;background:#f7f3ee;font-family:Arial;max-width:800px;margin:0 auto;}
h1{color:#8B4B35;margin-bottom:20px;}
.box{background:#fff;padding:20px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.1);margin-bottom:20px;}
label{display:block;margin:8px 0 4px;color:#666;}
input,textarea{width:100%;padding:10px;border:1px solid #ddd;border-radius:4px;margin-bottom:10px;}
button{width:100%;padding:12px;background:#8B4B35;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:16px;}
button:hover{background:#7a402d;}
.tip{padding:10px;margin:10px 0;border-radius:4px;display:none;}
.success{background:#d4edda;color:#155724;display:block;}
.error{background:#f8d7da;color:#721c24;display:block;}
#giftList{margin-top:20px;}
.item{background:#fff;padding:15px;border-radius:8px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,0.1);}
</style>
</head>
<body>
<h1>回忆礼物领养站 🧡</h1>

<!-- 添加物品面板 -->
<div class="box">
  <h3>添加物品</h3>
  <label>物品名称</label>
  <input type="text" id="name" placeholder="输入名称" value="测试物品">
  
  <label>物品描述</label>
  <textarea id="desc" placeholder="输入描述">测试描述</textarea>
  
  <button onclick="add()">添加物品</button>
</div>

<!-- 提示框 -->
<div id="tip" class="tip"></div>

<!-- 物品列表 -->
<div id="giftList">加载中...</div>

<script>
// 1. 核心配置（确认这行是你的环境ID，不要改）
const env = "gr1-3gwaj6dyccc835f1";

// 2. 初始化SDK（固定正确写法，无变量错误）
const tcb = window.cloudbase;
const app = tcb.init({
  env: env,
  region: "ap-shanghai"
});

// 3. 工具函数：显示提示
function tip(msg, isOk) {
  const el = document.getElementById('tip');
  el.innerText = msg;
  el.className = `tip ${isOk ? 'success' : 'error'}`;
  setTimeout(() => el.className = 'tip', 3000);
}

// 4. 加载列表（页面加载就执行）
async function load() {
  try {
    const res = await app.callFunction({
      name: 'gift',
      data: { api: 'list' }
    });
    const list = document.getElementById('giftList');
    if (res.result.code === 0) {
      if (res.result.data.length === 0) {
        list.innerHTML = "<div class='item'>暂无物品，点击添加第一个～</div>";
      } else {
        list.innerHTML = res.result.data.map(g => `
          <div class='item'>
            <h4>${g.name}</h4>
            <p>${g.desc}</p>
            <p>剩余：${g.stock - g.claimed}份</p>
          </div>
        `).join('');
      }
    } else {
      tip('加载失败：' + res.result.msg, false);
    }
  } catch (e) {
    document.getElementById('giftList').innerHTML = "<div class='item'>加载失败，刷新重试</div>";
  }
}

// 5. 添加物品（核心函数，无任何多余逻辑）
async function add() {
  const name = document.getElementById('name').value.trim();
  const desc = document.getElementById('desc').value.trim();
  
  if (!name) {
    tip('请填写物品名称', false);
    return;
  }

  tip('正在添加...', true);
  
  try {
    const res = await app.callFunction({
      name: 'gift',
      data: {
        api: 'add',
        name: name,
        desc: desc,
        stock: 1,
        claimers: [],
        claimed: 0
      }
    });

    if (res.result.code === 0) {
      tip('添加成功！ID：' + res.result.data._id, true);
      // 清空表单+重新加载列表
      document.getElementById('name').value = '';
      document.getElementById('desc').value = '';
      load();
    } else {
      tip('添加失败：' + res.result.msg, false);
    }
  } catch (e) {
    tip('添加失败：' + e.message, false);
  }
}

// 6. 页面加载自动执行
window.onload = load;
</script>
</body>
</html>
