<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>回忆礼物领养站 - 多CDN修复版球球了</title>
<!-- 多个CDN备用，按顺序尝试 -->
<script src="https://cdn.jsdelivr.net/npm/@cloudbase/js-sdk@2.6.1/dist/cloudbase.full.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{padding:20px;background:#f7f3ee;font-family:Arial;max-width:800px;margin:0 auto;}
h1{color:#8B4B35;margin-bottom:20px;}
.box{background:#fff;padding:20px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.1);margin-bottom:20px;}
label{display:block;margin:8px 0 4px;color:#666;}
input,textarea{width:100%;padding:10px;border:1px solid #ddd;border-radius:4px;margin-bottom:10px;}
button{width:100%;padding:12px;background:#8B4B35;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:16px;}
button:hover{background:#7a402d;}
.tip{padding:10px;margin:10px 0;border-radius:4px;display:none;}
.success{background:#d4edda;color:#155724;display:block;}
.error{background:#f8d7da;color:#721c24;display:block;}
#giftList{margin-top:20px;}
.item{background:#fff;padding:15px;border-radius:8px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,0.1);}
.loading{text-align:center;padding:20px;color:#666;}
</style>
</head>
<body>
<h1>回忆礼物领养站 🧡</h1>

<!-- 添加物品面板 -->
<div class="box">
  <h3>添加物品</h3>
  <label>物品名称</label>
  <input type="text" id="name" placeholder="输入名称" value="测试物品">
  
  <label>物品描述</label>
  <textarea id="desc" placeholder="输入描述">测试描述</textarea>
  
  <button id="addBtn">添加物品</button>
</div>

<!-- 提示框 -->
<div id="tip" class="tip"></div>

<!-- 物品列表 -->
<div id="giftList" class="loading">正在初始化...</div>

<script>
// 你的环境ID
const ENV_ID = "gr1-3gwaj6dyccc835f1";

// 核心变量
let cloudApp = null;
let isInitialized = false;
let sdkLoadAttempts = 0;
const maxSdkLoadAttempts = 3;

// 多个备用的CDN地址
const sdkCDNs = [
  'https://cdn.jsdelivr.net/npm/@cloudbase/js-sdk@2.6.1/dist/cloudbase.full.js',
  'https://unpkg.com/@cloudbase/js-sdk@2.6.1/dist/cloudbase.full.js',
  'https://cdnjs.cloudflare.com/ajax/libs/cloudbase-js-sdk/2.6.1/cloudbase.full.js'
];

// 工具函数：显示提示
function showTip(msg, isSuccess) {
  const tipEl = document.getElementById('tip');
  tipEl.innerText = msg;
  tipEl.className = isSuccess ? 'tip success' : 'tip error';
  setTimeout(() => {
    tipEl.className = 'tip';
  }, 3000);
}

// 动态加载SDK
function loadSDK(cdnIndex = 0) {
  if (cdnIndex >= sdkCDNs.length) {
    showTip("所有CDN都加载失败，请检查网络连接", false);
    document.getElementById('giftList').innerHTML = '<div class="item">SDK加载失败，请刷新页面重试</div>';
    return;
  }
  
  sdkLoadAttempts++;
  console.log(`尝试加载SDK (${sdkLoadAttempts}/${maxSdkLoadAttempts}): ${sdkCDNs[cdnIndex]}`);
  
  const script = document.createElement('script');
  script.src = sdkCDNs[cdnIndex];
  script.onload = function() {
    console.log("SDK加载成功，开始初始化...");
    initCloudBase();
  };
  script.onerror = function() {
    console.log(`CDN ${cdnIndex} 加载失败，尝试下一个...`);
    if (sdkLoadAttempts < maxSdkLoadAttempts) {
      loadSDK(cdnIndex + 1);
    } else {
      showTip("SDK加载失败，请检查网络连接", false);
      document.getElementById('giftList').innerHTML = '<div class="item">SDK加载失败，请刷新页面重试或联系管理员</div>';
    }
  };
  document.head.appendChild(script);
}

// 加载物品列表
async function loadGiftList() {
  if (!isInitialized || !cloudApp) {
    showTip("SDK初始化中，请稍等...", false);
    setTimeout(loadGiftList, 1000);
    return;
  }
  
  try {
    const res = await cloudApp.callFunction({
      name: 'gift',
      data: { api: 'list' }
    });
    
    const listEl = document.getElementById('giftList');
    if (res.result && res.result.code === 0) {
      if (res.result.data.length === 0) {
        listEl.innerHTML = '<div class="item">暂无物品，点击添加第一个～</div>';
      } else {
        listEl.innerHTML = res.result.data.map(gift => `
          <div class='item'>
            <h4>${gift.name}</h4>
            <p>${gift.desc}</p>
            <p>剩余：${gift.stock - gift.claimed}份</p>
          </div>
        `).join('');
      }
    } else {
      showTip('列表加载失败：' + (res.result?.msg || '未知错误'), false);
    }
  } catch (e) {
    document.getElementById('giftList').innerHTML = '<div class="item">加载失败，刷新页面重试</div>';
    showTip('加载异常：' + e.message, false);
  }
}

// 添加物品
async function addGift() {
  if (!isInitialized || !cloudApp) {
    showTip("SDK还在初始化，请稍等", false);
    return;
  }
  
  const giftName = document.getElementById('name').value.trim();
  const giftDesc = document.getElementById('desc').value.trim();
  
  if (!giftName) {
    showTip("请填写物品名称", false);
    return;
  }
  
  showTip("正在添加物品...", true);
  
  try {
    const res = await cloudApp.callFunction({
      name: 'gift',
      data: {
        api: 'add',
        name: giftName,
        desc: giftDesc,
        stock: 1,
        claimers: [],
        claimed: 0
      }
    });
    
    if (res.result && res.result.code === 0) {
      showTip('添加成功！物品ID：' + res.result.data._id, true);
      document.getElementById('name').value = '';
      document.getElementById('desc').value = '';
      loadGiftList();
    } else {
      showTip('添加失败：' + (res.result?.msg || '云函数返回错误'), false);
    }
  } catch (e) {
    showTip('添加失败：' + e.message, false);
    console.error('添加物品错误详情：', e);
  }
}

// 初始化云开发SDK
function initCloudBase() {
  try {
    // 检查window.cloudbase是否存在
    if (!window.cloudbase || typeof window.cloudbase.init !== 'function') {
      console.error("cloudbase对象不存在或init不是函数");
      showTip("SDK对象异常，请刷新页面", false);
      return;
    }
    
    console.log("开始初始化云开发SDK...");
    
    // 新版SDK初始化方式
    cloudApp = window.cloudbase.init({
      env: ENV_ID,
      region: "ap-shanghai"
    });
    
    // 标记初始化完成
    isInitialized = true;
    console.log("云开发SDK初始化成功");
    
    // 加载列表
    loadGiftList();
    
    // 绑定事件
    document.getElementById('addBtn').addEventListener('click', addGift);
    
    showTip("系统初始化成功！", true);
    
  } catch (error) {
    console.error("SDK初始化失败:", error);
    showTip("云开发SDK初始化失败: " + error.message, false);
    document.getElementById('giftList').innerHTML = '<div class="item">系统初始化失败，请刷新页面</div>';
  }
}

// 页面加载完成后开始初始化
window.addEventListener('DOMContentLoaded', function() {
  console.log("页面DOM加载完成，开始检查SDK...");
  
  // 先检查SDK是否已加载
  if (window.cloudbase && typeof window.cloudbase.init === 'function') {
    console.log("SDK已通过script标签加载，开始初始化...");
    initCloudBase();
  } else {
    console.log("SDK未加载，开始动态加载...");
    document.getElementById('giftList').innerHTML = '<div class="loading">正在加载SDK...</div>';
    
    // 设置超时检查
    setTimeout(function() {
      if (!window.cloudbase) {
        console.log("script标签加载SDK失败，开始动态加载备用CDN...");
        loadSDK(0);
      }
    }, 2000);
  }
});

// 添加手动重试按钮
function addRetryButton() {
  const giftList = document.getElementById('giftList');
  giftList.innerHTML = `
    <div class="item">
      <h4>SDK加载失败</h4>
      <p>无法连接云开发服务，请检查：</p>
      <ol style="margin: 10px 0; padding-left: 20px;">
        <li>网络连接是否正常</li>
        <li>浏览器是否允许运行JavaScript</li>
        <li>是否在安全网络环境中</li>
      </ol>
      <button id="retryBtn" style="background: #4CAF50; margin-top: 10px;">重试连接</button>
    </div>
  `;
  
  document.getElementById('retryBtn').addEventListener('click', function() {
    location.reload();
  });
}

// 检查SDK是否可用
function checkSDKAvailability() {
  if (!window.cloudbase) {
    setTimeout(checkSDKAvailability, 1000);
  }
}
</script>
</body>
</html>
