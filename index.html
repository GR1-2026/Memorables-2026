<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memorables 2026 🧡</title>
    <base href="./">
    <style>
        :root {
            --primary: #8B7355;
            --secondary: #D9C5B2;
            --bg-light: #F9F7F5;
            --bg-card: #FFFFFF;
            --text-main: #2D2A26;
            --text-light: #736B60;
            --border-radius: 12px;
            --spacing-xs: 8px;
            --spacing-sm: 16px;
            --spacing-md: 24px;
            --spacing-lg: 32px;
            --shadow: 0 4px 12px rgba(0,0,0,0.04);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Inter", "微软雅黑", sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-main);
            padding: var(--spacing-sm);
            max-width: 1200px;
            margin: 0 auto;
            line-height: 1.65;
        }

        .letter-box {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: var(--spacing-sm);
        }

        .letter-card {
            background: var(--bg-card);
            border-radius: var(--border-radius);
            padding: var(--spacing-lg);
            max-width: 500px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(139, 115, 85, 0.1);
            position: relative;
        }

        .letter-close {
            position: absolute;
            top: var(--spacing-sm);
            right: var(--spacing-sm);
            width: 32px;
            height: 32px;
            border: none;
            background: transparent;
            color: var(--text-light);
            font-size: 20px;
            cursor: pointer;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .letter-close:hover {
            background: var(--bg-light);
            color: var(--primary);
        }

        .letter-title {
            font-size: 22px;
            font-weight: 500;
            color: var(--primary);
            text-align: center;
            margin-bottom: var(--spacing-md);
            letter-spacing: 0.5px;
        }

        .letter-content {
            font-size: 16px;
            color: var(--text-main);
            margin-bottom: var(--spacing-md);
        }

        .letter-sign {
            font-size: 14px;
            font-style: italic;
            color: var(--primary);
            text-align: right;
            opacity: 0.8;
        }

        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: var(--spacing-md) 0;
            padding-bottom: var(--spacing-sm);
            border-bottom: 1px solid rgba(139, 115, 85, 0.1);
        }

        .nav-title {
            font-size: 20px;
            font-weight: 500;
            color: var(--primary);
            letter-spacing: 0.3px;
        }

        .admin-icon {
            width: 36px;
            height: 36px;
            cursor: pointer;
            font-size: 20px;
            color: var(--text-light);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.3s ease;
        }

        .admin-icon:hover {
            background: var(--bg-light);
            color: var(--primary);
        }

        .admin-panel {
            background: var(--bg-card);
            border-radius: var(--border-radius);
            padding: var(--spacing-md);
            margin-bottom: var(--spacing-md);
            box-shadow: var(--shadow);
            border: 1px solid rgba(139, 115, 85, 0.1);
            display: none;
        }

        .admin-panel.show {
            display: block;
        }

        .form-item {
            margin-bottom: var(--spacing-md);
        }

        .form-title {
            font-size: 16px;
            font-weight: 500;
            color: var(--primary);
            margin-bottom: var(--spacing-sm);
            display: block;
        }

        input, textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid rgba(139, 115, 85, 0.15);
            border-radius: var(--border-radius);
            background: var(--bg-light);
            font-size: 16px;
            color: var(--text-main);
            transition: border 0.3s ease;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            background: #FFFFFF;
        }

        textarea {
            min-height: 120px;
            resize: vertical;
            line-height: 1.65;
        }

        .upload-box {
            border: 1px dashed rgba(139, 115, 85, 0.3);
            background: var(--bg-light);
            border-radius: var(--border-radius);
            padding: var(--spacing-lg);
            text-align: center;
            margin-bottom: var(--spacing-sm);
            cursor: pointer;
            transition: all 0.3s ease;
            color: var(--text-light);
        }

        .upload-box:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .preview-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: var(--border-radius);
            margin: var(--spacing-sm) 0;
            display: none;
            box-shadow: var(--shadow);
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: var(--border-radius);
            background: var(--primary);
            color: white;
            font-size: 16px;
        }
    </style>
</head>
