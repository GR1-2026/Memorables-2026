<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>测试添加物品</title>
<style>
body{padding:20px;font-family:Arial;}
.tip{padding:10px;margin:10px 0;border-radius:4px;display:none;}
.success{background:#d4edda;color:#155724;display:block;}
.error{background:#f8d7da;color:#721c24;display:block;}
input,textarea,button{width:300px;margin:5px 0;padding:8px;display:block;}
button{background:#007bff;color:white;border:none;border-radius:4px;cursor:pointer;}
</style>
</head>
<body>
<h3>测试添加物品（仅核心功能）</h3>
<input type="text" id="name" placeholder="物品名称" value="测试物品">
<textarea id="desc" placeholder="物品描述">测试描述</textarea>
<button onclick="addGift()">添加物品</button>
<div id="tip" class="tip"></div>

<script>
// 你的云函数地址（直接写死，避免拼接错误）
const URL = "https://gr1-3gwaj6dyccc835f1.ap-shanghai.tcb-api.tencentcloudapi.com/web/gift";

// 显示提示
function showTip(msg, isSuccess) {
  const tip = document.getElementById('tip');
  tip.innerText = msg;
  tip.className = isSuccess ? "tip success" : "tip error";
}

// 核心添加函数
async function addGift() {
  showTip("正在添加...", true);
  
  try {
    const response = await fetch(URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        api: "add",
        name: document.getElementById('name').value,
        desc: document.getElementById('desc').value,
        stock: 1
      })
    });

    const result = await response.json();
    if (result.code === 0) {
      showTip(`添加成功！物品ID：${result.data._id}`, true);
    } else {
      showTip(`添加失败：${result.msg}`, false);
    }
  } catch (err) {
    showTip(`添加失败：${err.message}`, false);
  }
}
</script>
</body>
</html>
