<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>回忆礼物领养站 - 上海区域</title>
<!-- 使用微信官方CDN，稳定版本 -->
<script src="https://res.wx.qq.com/open/js/cloudbase/1.3.2/cloud.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{padding:20px;background:#f7f3ee;font-family:Arial;max-width:800px;margin:0 auto;}
h1{color:#8B4B35;margin-bottom:20px;}
.box{background:#fff;padding:20px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.1);margin-bottom:20px;}
label{display:block;margin:8px 0 4px;color:#666;}
input,textarea{width:100%;padding:10px;border:1px solid #ddd;border-radius:4px;margin-bottom:10px;}
button{width:100%;padding:12px;background:#8B4B35;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:16px;}
button:hover{background:#7a402d;}
.tip{padding:10px;margin:10px 0;border-radius:4px;display:none;}
.success{background:#d4edda;color:#155724;display:block;}
.error{background:#f8d7da;color:#721c24;display:block;}
#giftList{margin-top:20px;}
.item{background:#fff;padding:15px;border-radius:8px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,0.1);}
.loading{text-align:center;padding:20px;color:#666;}
</style>
</head>
<body>
<h1>回忆礼物领养站 🧡</h1>

<!-- 添加物品面板 -->
<div class="box">
  <h3>添加物品</h3>
  <label>物品名称</label>
  <input type="text" id="name" placeholder="输入名称" value="测试物品">
  
  <label>物品描述</label>
  <textarea id="desc" placeholder="输入描述">测试描述</textarea>
  
  <button id="addBtn">添加物品</button>
</div>

<!-- 提示框 -->
<div id="tip" class="tip"></div>

<!-- 物品列表 -->
<div id="giftList" class="loading">正在初始化...</div>

<script>
// 你的环境ID
const ENV_ID = "gr1-3gwaj6dyccc835f1";

// 重要：根据腾讯云控制台显示，环境在上海
const REGION = "ap-shanghai";  // 确认是上海

// 核心变量
let cloudApp = null;
let isInitialized = false;

// 工具函数：显示提示
function showTip(msg, isSuccess) {
  const tipEl = document.getElementById('tip');
  tipEl.innerText = msg;
  tipEl.className = isSuccess ? 'tip success' : 'tip error';
  setTimeout(() => {
    tipEl.className = 'tip';
  }, 3000);
}

// 加载物品列表
async function loadGiftList() {
  if (!isInitialized || !cloudApp) {
    showTip("SDK初始化中，请稍等...", false);
    setTimeout(loadGiftList, 1000);
    return;
  }
  
  try {
    const res = await cloudApp.callFunction({
      name: 'gift',
      data: { api: 'list' }
    });
    
    const listEl = document.getElementById('giftList');
    if (res.result && res.result.code === 0) {
      if (res.result.data.length === 0) {
        listEl.innerHTML = '<div class="item">暂无物品，点击添加第一个～</div>';
      } else {
        listEl.innerHTML = res.result.data.map(gift => `
          <div class='item'>
            <h4>${gift.name}</h4>
            <p>${gift.desc}</p>
            <p>剩余：${gift.stock - gift.claimed}份</p>
          </div>
        `).join('');
      }
    } else {
      showTip('列表加载失败：' + (res.result?.msg || '未知错误'), false);
    }
  } catch (e) {
    document.getElementById('giftList').innerHTML = '<div class="item">加载失败，刷新页面重试</div>';
    showTip('加载异常：' + e.message, false);
  }
}

// 添加物品
async function addGift() {
  if (!isInitialized || !cloudApp) {
    showTip("SDK还在初始化，请稍等", false);
    return;
  }
  
  const giftName = document.getElementById('name').value.trim();
  const giftDesc = document.getElementById('desc').value.trim();
  
  if (!giftName) {
    showTip("请填写物品名称", false);
    return;
  }
  
  showTip("正在添加物品...", true);
  
  try {
    const res = await cloudApp.callFunction({
      name: 'gift',
      data: {
        api: 'add',
        name: giftName,
        desc: giftDesc,
        stock: 1,
        claimers: [],
        claimed: 0
      }
    });
    
    if (res.result && res.result.code === 0) {
      showTip('添加成功！物品ID：' + res.result.data._id, true);
      document.getElementById('name').value = '';
      document.getElementById('desc').value = '';
      loadGiftList();
    } else {
      showTip('添加失败：' + (res.result?.msg || '云函数返回错误'), false);
    }
  } catch (e) {
    showTip('添加失败：' + e.message, false);
    console.error('添加物品错误详情：', e);
  }
}

// 初始化云开发SDK
function initCloudBase() {
  try {
    // 检查window.cloudbase是否存在
    if (!window.cloudbase || typeof window.cloudbase.init !== 'function') {
      console.error("cloudbase对象不存在或init不是函数");
      showTip("SDK对象异常，请刷新页面", false);
      return;
    }
    
    console.log("开始初始化云开发SDK，环境ID:", ENV_ID, "区域:", REGION);
    
    // 初始化SDK - 使用上海区域
    cloudApp = window.cloudbase.init({
      env: ENV_ID,
      region: REGION
    });
    
    // 标记初始化完成
    isInitialized = true;
    console.log("云开发SDK初始化成功");
    
    // 加载列表
    loadGiftList();
    
    // 绑定事件
    document.getElementById('addBtn').addEventListener('click', addGift);
    
    showTip("系统初始化成功！", true);
    
  } catch (error) {
    console.error("SDK初始化失败:", error);
    showTip("云开发SDK初始化失败: " + error.message, false);
    document.getElementById('giftList').innerHTML = `
      <div class="item">
        <h4>初始化失败</h4>
        <p>错误: ${error.message}</p>
        <p>可能原因:</p>
        <ol style="margin: 10px 0; padding-left: 20px;">
          <li>安全域名未配置（重要！）</li>
          <li>网络连接问题</li>
          <li>环境ID或区域配置错误</li>
        </ol>
        <h5 style="margin-top: 10px;">安全域名配置步骤：</h5>
        <ol style="margin: 10px 0; padding-left: 20px;">
          <li>登录腾讯云控制台 -> 云开发 CloudBase</li>
          <li>选择环境 gr1-3gwaj6dyccc835f1</li>
          <li>左侧菜单：安全配置 -> Web安全域名</li>
          <li>添加当前域名（本地开发用 localhost 或 127.0.0.1）</li>
        </ol>
        <button onclick="location.reload()" style="background: #4CAF50; margin-top: 10px;">刷新页面</button>
      </div>
    `;
  }
}

// 页面加载完成后开始初始化
window.addEventListener('DOMContentLoaded', function() {
  console.log("页面DOM加载完成，开始检查SDK...");
  
  // 先检查SDK是否已加载
  if (window.cloudbase && typeof window.cloudbase.init === 'function') {
    console.log("SDK已通过script标签加载，开始初始化...");
    initCloudBase();
  } else {
    console.log("SDK未加载，等待加载...");
    document.getElementById('giftList').innerHTML = '<div class="loading">正在加载云开发SDK...</div>';
    
    // 设置超时检查
    setTimeout(function() {
      if (!window.cloudbase) {
        showTip("SDK加载失败，请检查网络连接", false);
        document.getElementById('giftList').innerHTML = `
          <div class="item">
            <h4>SDK加载失败</h4>
            <p>可能原因:</p>
            <ol style="margin: 10px 0; padding-left: 20px;">
              <li>网络连接问题，无法访问 https://res.wx.qq.com</li>
              <li>浏览器安全策略阻止了SDK加载</li>
              <li>CDN暂时不可用</li>
            </ol>
            <button onclick="location.reload()" style="background: #4CAF50; margin-top: 10px;">刷新页面</button>
            <button onclick="tryAlternativeSDK()" style="background: #2196F3; margin-top: 10px; margin-left: 10px;">使用备用SDK</button>
          </div>
        `;
      }
    }, 3000);
  }
});

// 备用SDK加载方案
function tryAlternativeSDK() {
  console.log("尝试加载备用SDK...");
  document.getElementById('giftList').innerHTML = '<div class="loading">正在加载备用SDK...</div>';
  
  // 尝试腾讯云官方CDN
  const alternativeSDK = document.createElement('script');
  alternativeSDK.src = 'https://static.cloudbase.net/cloudbase-js-sdk/1.3.2/cloudbase.full.js';
  alternativeSDK.onload = function() {
    console.log("备用SDK加载成功，开始初始化...");
    // 腾讯云SDK的全局对象是cloudbase
    if (window.cloudbase && typeof window.cloudbase.init === 'function') {
      initCloudBase();
    } else {
      showTip("备用SDK加载但格式不对", false);
    }
  };
  alternativeSDK.onerror = function() {
    showTip("备用SDK也加载失败，请检查网络", false);
    document.getElementById('giftList').innerHTML = `
      <div class="item">
        <h4>所有SDK都加载失败</h4>
        <p>请尝试:</p>
        <ol style="margin: 10px 0; padding-left: 20px;">
          <li>检查浏览器是否允许加载外部脚本</li>
          <li>尝试使用其他浏览器（如Chrome）</li>
          <li>联系管理员</li>
        </ol>
        <button onclick="location.reload()" style="background: #4CAF50; margin-top: 10px;">重新加载</button>
      </div>
    `;
  };
  document.head.appendChild(alternativeSDK);
}
</script>
</body>
</html>
